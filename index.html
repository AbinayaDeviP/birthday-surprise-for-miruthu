<style>
body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:#070311;
    overflow-x:hidden;
    color:white;
}

/* Background stars */

.stars{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    z-index:-1;
}

.star{
    position:absolute;
    width:3px;
    height:3px;
    background:white;
    border-radius:50%;
    opacity:0.7;
    animation:twinkle 4s infinite ease-in-out;
}

@keyframes twinkle{
    0%,100%{
        opacity:0.2;
    }
    50%{
        opacity:1;
    }
}

/* Hero Section */

.hero{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:30px 20px;
    position:relative;
}

.small-text{
    color:#ff9ed2;
    letter-spacing:3px;
    font-size:14px;
    margin-bottom:20px;
}

.hero h1{
    font-size:58px;
    line-height:1.1;
    margin:0;
    color:#ff7ac6;
    text-shadow:
    0 0 10px rgba(255,122,198,0.5);
}

.hero h2{
    font-size:42px;
    margin-top:10px;
    color:white;
    font-weight:600;
}

.message{
    max-width:320px;
    margin-top:25px;
    font-size:18px;
    line-height:1.7;
    color:#e7dff5;
}

/* Elegant button */

.btn{
    margin-top:35px;
    padding:16px 38px;
    border-radius:50px;
    border:none;
    background:linear-gradient(45deg,#ff4fa3,#ff7ac6);
    color:white;
    font-size:18px;
    font-weight:bold;
    box-shadow:
    0 0 20px rgba(255,105,180,0.35);
    cursor:pointer;
}

/* Memory Section */

.memories{
    padding:70px 20px;
    text-align:center;
}

.memories h3{
    font-size:34px;
    color:#ff9ed2;
    margin-bottom:40px;
}

.gallery{
    display:flex;
    gap:20px;
    overflow-x:auto;
    padding-bottom:20px;
}

.card{
    min-width:220px;
    background:#12081f;
    border-radius:22px;
    padding:12px;
    border:1px solid rgba(255,255,255,0.08);
    box-shadow:
    0 0 20px rgba(255,105,180,0.08);
}

.card img{
    width:100%;
    height:260px;
    object-fit:cover;
    border-radius:18px;
}

.card p{
    margin-top:12px;
    color:#ffd6ee;
}

/* Mobile */

@media(max-width:768px){

.hero h1{
    font-size:42px;
}

.hero h2{
    font-size:30px;
}

.message{
    font-size:16px;
}

.card{
    min-width:180px;
}

}
</style>

<!-- Background Stars -->

<div class="stars" id="stars"></div>

<!-- Hero -->

<section class="hero">

<div class="small-text">
TO THE MOST SPECIAL PERSON ✨
</div>

<h1>Happy Birthday</h1>

<h2>Miruthu ❤️</h2>

<div class="message">
You are the brightest star in my sky ✨<br><br>
Thank you for every laugh, every memory and every moment 💕
</div>

<button class="btn">
🎁 Open Surprise
</button>

</section>

<!-- Memories -->

<section class="memories">

<h3>📸 Our Beautiful Memories</h3>

<div class="gallery">

<div class="card">
<img src="IMG20260221132406.jpg">
<img src="IMG20230716163615.jpg">  
<p>Memories ❤️</p>
</div>

<div class="card">
<img src="IMG-20231226-WA0041">
<p>Crazy Moment ✨</p>
</div>

<div class="card">
<img src="IMG_20260405_155922658">
<p>Forever Together 💕</p>
</div>

</div>

</section>

<script>

/* Elegant stars only */

const starsContainer=document.getElementById('stars');

for(let i=0;i<80;i++){

let star=document.createElement('div');
star.classList.add('star');

star.style.top=Math.random()*100+'%';
star.style.left=Math.random()*100+'%';

star.style.animationDuration=
(Math.random()*3+2)+'s';

starsContainer.appendChild(star);

}

</script>
