<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#05010d;
    font-family:'Poppins',sans-serif;
    overflow-x:hidden;
    color:white;
}

/* Stars Background */

.stars{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    z-index:-1;
}

.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    opacity:0.7;
    animation:twinkle 4s infinite ease-in-out;
}

@keyframes twinkle{
    0%,100%{
        opacity:0.2;
    }
    50%{
        opacity:1;
    }
}

/* Hero */

.hero{
    width:100%;
    padding-top:120px;
    padding-bottom:80px;

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;

    text-align:center;
}

/* Top Small Text */

.small-text{
    color:#ffb3dc;
    letter-spacing:3px;
    font-size:11px;
    margin-bottom:18px;
}

/* Main Heading */

.hero h1{
    font-size:44px;
    line-height:1.1;
    color:#ff72c3;

    text-shadow:
    0 0 12px rgba(255,114,195,0.4);

    margin-bottom:10px;
}

/* Name */

.hero h2{
    font-size:30px;
    font-weight:600;
    margin-bottom:28px;
}

/* Message */

.message{
    width:85%;
    max-width:320px;

    font-size:17px;
    line-height:1.8;

    color:#ece4f7;
}

/* Button */

.btn{
    margin-top:35px;

    padding:15px 34px;

    border:none;
    border-radius:50px;

    background:linear-gradient(
    45deg,
    #ff4fa3,
    #ff7cc8
    );

    color:white;

    font-size:17px;
    font-weight:600;

    box-shadow:
    0 0 18px rgba(255,79,163,0.35);
}

/* Memories */

.memories{
    padding:50px 20px 90px;
    text-align:center;
}

.memories h3{
    color:#ff9ed2;
    font-size:30px;
    margin-bottom:35px;
}

/* Gallery */

.gallery{
    display:flex;
    gap:18px;
    overflow-x:auto;

    padding-bottom:10px;
}

/* Cards */

.card{
    min-width:190px;

    background:#12081f;

    border-radius:20px;

    padding:10px;

    border:1px solid rgba(255,255,255,0.08);

    box-shadow:
    0 0 18px rgba(255,105,180,0.08);
}

.card img{
    width:100%;
    height:240px;

    object-fit:cover;

    border-radius:16px;
}

.card p{
    margin-top:10px;
    color:#ffd6ee;
}

/* Music Button */

#musicBtn{
    position:fixed;
    right:18px;
    bottom:18px;

    background:#ff4fa3;
    color:white;

    border:none;

    padding:12px 18px;

    border-radius:50px;

    font-size:15px;

    z-index:1000;

    box-shadow:
    0 0 15px rgba(255,79,163,0.3);
}

</style>

<!-- Stars -->

<div class="stars" id="stars"></div>

<!-- Hero Section -->

<section class="hero">

<div class="small-text">
TO THE MOST SPECIAL PERSON ✨
</div>

<h1>Happy Birthday</h1>

<h2>Miruthu ❤️</h2>

<div class="message">
You are the brightest star in my sky ✨<br><br>

Thank you for every laugh, every memory and every moment 💕
</div>

<button class="btn">
🎁 Open Surprise
</button>

</section>

<!-- Memories -->

<section class="memories">

<h3>📸 Our Beautiful Memories</h3>

<div class="gallery">

<div class="card">
<img src="photo1.jpg">
<p>First Meet ❤️</p>
</div>

<div class="card">
<img src="photo2.jpg">
<p>Favorite Moment ✨</p>
</div>

<div class="card">
<img src="photo3.jpg">
<p>Forever Together 💕</p>
</div>

</div>

</section>

<!-- Music -->

<audio id="bgMusic" autoplay loop>
<source src="https://files.catbox.moe/0j6p6x.mp3" type="audio/mp3">
</audio>

<button id="musicBtn">
🎵 Music
</button>

<script>

/* Stars */

const starsContainer =
document.getElementById('stars');

for(let i=0;i<90;i++){

let star =
document.createElement('div');

star.classList.add('star');

star.style.top =
Math.random()*100+'%';

star.style.left =
Math.random()*100+'%';

star.style.animationDuration =
(Math.random()*3+2)+'s';

starsContainer.appendChild(star);

}

/* Music */

const music =
document.getElementById("bgMusic");

const btn =
document.getElementById("musicBtn");

btn.addEventListener("click",()=>{

if(music.paused){

music.play();
btn.innerHTML="🎵 Music";

}else{

music.pause();
btn.innerHTML="🔇 Muted";

}

});

</script>
